<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DECA AgentKit Demo</title>
  <style>
    :root {
      --bg: #fafafa;
      --text: #171717;
      --muted: #737373;
      --line: #e5e5e5;
      --accent: #00a0e9;
      --red: #f93549;
      --navy: #1d2087;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141414;
        --text: #fafafa;
        --muted: #a3a3a3;
        --line: #262626;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 0.9375rem;
      line-height: 1.55;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 8%, rgba(0, 160, 233, 0.12), transparent 22rem),
        radial-gradient(circle at 92% 10%, rgba(208, 24, 125, 0.12), transparent 20rem),
        var(--bg);
      margin: 0;
    }

    .container {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      max-width: 560px;
      width: 100%;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      .card {
        background: rgba(30, 30, 30, 0.7);
      }
    }

    .logo {
      display: inline-block;
      margin-bottom: 2rem;
    }

    .logo svg {
      width: 160px;
      height: auto;
    }

    .skeleton {
      background: var(--line);
      border-radius: 6px;
    }

    .skeleton-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .skeleton-row {
      display: flex;
      gap: 0.6rem;
    }

    .sk-h { height: 1rem; }
    .sk-lg { height: 1.5rem; }
    .sk-sm { height: 0.75rem; }
    .w-full { width: 100%; }
    .w-3-4 { width: 75%; margin-inline: auto; }
    .w-1-2 { width: 50%; margin-inline: auto; }
    .w-2-3 { width: 66%; margin-inline: auto; }
    .w-1-3 { width: 33%; }

    .intro {
      color: var(--muted);
      margin-bottom: 1.75rem;
    }
  </style>
</head>
